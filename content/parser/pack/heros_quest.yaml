meta:
  id: heros_quest_v1
  title: "Hero's Quest: The Castle of Shadows"
  start_room: castle_gates
  vars_init:
    hp: 20
    max_hp: 20
    mana: 10
    max_mana: 10
    dexterity: 12
    strength: 12
    intelligence: 12
    climbing: 5
    lockpicking: 4
    gold: 0
    xp: 0
    score: 0
  flags_init: [ gates_locked, chest_locked, boss_sentry_active, wall_climb_attempted ]

rooms:
  - id: castle_gates
    name: "Castle Gates"
    description: "You stand before the towering iron gates of the Castle of Shadows. The gates are shut tight. To the west lies a steep Castle Wall that looks climbable."
    objects: [ gate_lever ]
    npcs: [ royal_scout ]
    weather_pool: [ clear, rain, fog ]
    exits:
      - direction: west
        to: castle_wall
      - direction: north
        to: castle_courtyard
        conditions: [ { not_flag: gates_locked } ]
        locked_msg: "The massive iron gates are locked tight and cannot be opened from this side."

  - id: castle_wall
    name: "Castle Wall"
    description: "A sheer stone wall rises up into the darkness. Handholds are sparse, but a skilled climber could scale it to reach the battlements above."
    objects: [ stone_wall ]
    npcs: []
    weather_pool: [ clear, rain, storm ]
    exits:
      - direction: east
        to: castle_gates
      - direction: up
        to: battlements
        conditions: [ { has_flag: wall_climb_success } ]
        locked_msg: "The wall is too steep! You must successfully climb it first."

  - id: battlements
    name: "Castle Battlements"
    description: "Wind howls across the castle battlements. From here, a stone stairway leads down into the Castle Courtyard."
    objects: []
    npcs: []
    weather_pool: [ clear, rain, storm ]
    exits:
      - direction: down
        to: castle_courtyard

  - id: castle_courtyard
    name: "Castle Courtyard"
    description: "A wide cobblestone courtyard. A menacing Goblin Guard stands in the center, blocking access to the inner rooms: the Library to the west, the Armory to the east, and the Dungeon to the north."
    objects: []
    npcs: [ goblin_guard ]
    weather_pool: [ clear, rain, fog, storm ]
    exits:
      - direction: south
        to: castle_gates
      - direction: west
        to: library
        conditions: [ { has_flag: npc_dead_goblin_guard } ]
        locked_msg: "The Goblin Guard blocks your path to the west!"
      - direction: east
        to: armory
        conditions: [ { has_flag: npc_dead_goblin_guard } ]
        locked_msg: "The Goblin Guard blocks your path to the east!"
      - direction: north
        to: dungeons
        conditions: [ { has_flag: npc_dead_goblin_guard } ]
        locked_msg: "The Goblin Guard blocks your path to the north!"

  - id: armory
    name: "The Castle Armory"
    description: "Racks of rusty weapons line the walls. A pristine steel broadsword rests on a velvet cushion."
    objects: [ broadsword ]
    npcs: []
    exits:
      - direction: west
        to: castle_courtyard

  - id: library
    name: "The Grand Library"
    description: "Shelves packed with ancient books rise to the ceiling. A mysterious leather-bound spell scroll rests on a wooden pedestal."
    objects: [ spell_scroll, royal_seal ]
    npcs: []
    exits:
      - direction: east
        to: castle_courtyard

  - id: dungeons
    name: "The Castle Dungeons"
    description: "Damp cells line this dark hallway. In the center stands the terrifying Shadow Knight, glowing with dark magic. To the north lies the Treasury."
    objects: []
    npcs: [ shadow_knight ]
    exits:
      - direction: south
        to: castle_courtyard
      - direction: north
        to: treasury
        conditions: [ { has_flag: npc_dead_shadow_knight } ]
        locked_msg: "The Shadow Knight blocks access to the Treasury!"

  - id: treasury
    name: "The Royal Treasury"
    description: "Piles of copper and silver lie scattered about. In the center sits a small, locked, iron-bound chest. An exit leads east to the King's Throne Room."
    objects: [ treasury_chest ]
    npcs: []
    exits:
      - direction: south
        to: dungeons
      - direction: east
        to: throne_room

  - id: throne_room
    name: "The Throne Room"
    description: "The magnificent Throne Room of the King. King Aldous sits upon his throne, looking weary. Speak to him."
    objects: []
    npcs: [ king_aldous ]
    exits:
      - direction: west
        to: treasury

objects:
  - id: gate_lever
    name: "gate lever"
    aliases: [ lever ]
    description: "A rusty metal lever connected to the gate mechanism. It is stuck."
    takeable: false

  - id: stone_wall
    name: "stone wall"
    aliases: [ wall ]
    description: "A sheer wall of mossy stone bricks."
    takeable: false
    interactions:
      - verb: USE
        conditions: [ { not_flag: wall_climb_success } ]
        effects:
          - roll_skill_check: { skill: "climbing", difficulty: 10, success_flag: "wall_climb_success" }
          - narrate: "You attempt to scale the castle wall..."

  - id: broadsword
    name: "steel broadsword"
    aliases: [ sword, broadsword, steel ]
    description: "A finely crafted steel sword that hums with energy. Equipping this increases your strength by 6."
    takeable: true
    interactions:
      - verb: TAKE
        effects:
          - inc_var: { name: "strength", by: 6 }
          - inc_var: { name: "score", by: 20 }
          - narrate: "You wield the steel broadsword! Your physical power increases!"

  - id: spell_scroll
    name: "spell scroll"
    aliases: [ scroll, spell ]
    description: "An ancient scroll inscribed with powerful magical runes."
    takeable: true
    interactions:
      - verb: READ
        effects:
          - inc_var: { name: "intelligence", by: 6 }
          - inc_var: { name: "mana", by: 5 }
          - inc_var: { name: "score", by: 20 }
          - remove_item: spell_scroll
          - narrate: "You read the magical scroll! Glowing runes expand your mind, increasing your intelligence and restoring mana! The scroll crumbles into sparkling dust."

  - id: royal_seal
    name: "Royal Seal"
    aliases: [ seal, royal seal, gold seal ]
    description: "An ancient golden seal engraved with the emblem of the kingdom."
    takeable: true

  - id: treasury_chest
    name: "iron-bound chest"
    aliases: [ chest, box ]
    description: "A small locked iron chest. It has no keyhole; the lock mechanism must be picked."
    takeable: false
    interactions:
      - verb: USE
        conditions: [ { not_flag: chest_unlocked } ]
        effects:
          - roll_skill_check: { skill: "lockpicking", difficulty: 12, success_flag: "chest_unlocked" }
          - narrate: "You carefully pull out your lockpicks and work on the chest lock..."
      - verb: OPEN
        conditions: [ { has_flag: chest_unlocked }, { not_flag: chest_opened } ]
        effects:
          - set_flag: chest_opened
          - add_item: royal_crown
          - inc_var: { name: "gold", by: 100 }
          - inc_var: { name: "score", by: 30 }
          - narrate: "You pop open the chest! Inside is the legendary Royal Crown and 100 gold coins!"

  - id: royal_crown
    name: "Royal Crown"
    aliases: [ crown, royal ]
    description: "The glistening golden crown of the kingdom, recovered from the treasury."
    takeable: true

  - id: scout_badge
    name: "Scout Badge"
    aliases: [ badge, scout badge ]
    description: "A bronze badge representing membership in the Royal Scouts guild."
    takeable: true

npcs:
  - id: goblin_guard
    name: "Goblin Guard"
    description: "A small, green-skinned goblin clutching a wooden club. He growls menacingly."
    hp: 12
    max_hp: 12
    attack: 2
    defense: 8
    gold: 25
    xp: 50
    dialogue:
      root: greet
      nodes:
        - id: greet
          npc_text: "You dare enter the castle? Prepare to fight, human!"
          effects:
            - start_combat: { npc_id: goblin_guard }
          topics:
            - id: bye
              prompt: "Fight!"
              end: true

  - id: shadow_knight
    name: "Shadow Knight"
    description: "A hulking warrior encased in obsidian armor, radiating purple negative energy."
    hp: 24
    max_hp: 24
    attack: 4
    defense: 12
    gold: 50
    xp: 100
    dialogue:
      root: greet
      nodes:
        - id: greet
          npc_text: "Foolish mortal! You shall bleed in the shadows!"
          effects:
            - start_combat: { npc_id: shadow_knight }
          topics:
            - id: bye
              prompt: "To arms!"
              end: true

  - id: king_aldous
    name: "King Aldous"
    description: "The weary monarch of the realm, sitting patiently in his throne room."
    dialogue:
      root: greet
      nodes:
        - id: greet
          npc_text: "Ah, traveler. The castle has fallen to shadows, and my crown is locked in the treasury. Can you restore my kingdom?"
          topics:
            - id: crown
              prompt: "I have recovered your Royal Crown!"
              goto: restore_kingdom
              conditions: [ { has_item: royal_crown } ]
            - id: help
              prompt: "I will help you, Sire."
              goto: help_accepted
            - id: bye
              prompt: "Goodbye, Sire."
              end: true
        - id: help_accepted
          npc_text: "Thank you, brave hero! Find my crown and return it to me."
          topics:
            - id: bye
              prompt: "I go."
              end: true
        - id: restore_kingdom
          npc_text: "My crown! You have restored the kingdom! The shadow is lifted, and peace shall reign once more!"
          effects:
            - remove_item: royal_crown
            - set_flag: kingdom_restored
            - inc_var: { name: "score", by: 30 }
          topics:
            - id: victory
              prompt: "Hail the King!"
              end: true

  - id: royal_scout
    name: "Royal Scout"
    description: "A keen-eyed scout wearing leather armor, watching the castle from the shadows."
    dialogue:
      root: greet
      greeting_overrides:
        - node: greet_fog
          conditions: [ { weather_is: "fog" } ]
        - node: greet_storm
          conditions: [ { weather_is: "storm" } ]
      nodes:
        - id: greet_fog
          npc_text: "Be careful out there, traveler. The fog is dense today, obscuring the path to the courtyard."
          topics:
            - { id: ask_contracts, prompt: "Ask about scout contracts", goto: contract_list }
            - { id: check_prestige, prompt: "Ask about your scouts prestige", goto: prestige_info }
            - { id: request_badge, prompt: "Request a Scout Badge (Requires 50 Royal Scouts Prestige)", goto: give_badge, conditions: [ { guild_prestige_gte: { guild: "royal_scouts", value: 50 } }, { none_of: [ { has_item: "scout_badge" } ] } ] }
            - { id: turn_in_smuggle, prompt: "Report delivery of the broadsword to the Castle Wall", goto: smuggle_success, conditions: [ { guild_contract_active: "c_smuggle_broadsword" }, { has_item: "broadsword" }, { visited: "castle_wall" } ] }
            - { id: turn_in_enforce, prompt: "Report defeat of the Goblin Guard", goto: enforce_success, conditions: [ { guild_contract_active: "c_enforce_goblin" }, { has_flag: "npc_dead_goblin_guard" } ] }
            - { id: turn_in_seal, prompt: "Report delivery of the Royal Seal to the Castle Wall", goto: seal_success, conditions: [ { guild_contract_active: "c_smuggle_royal_seal" }, { has_item: "royal_seal" }, { visited: "castle_wall" } ] }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: greet_storm
          npc_text: "A storm is raging! The castle wall is slick and the wind is howling across the battlements."
          topics:
            - { id: ask_contracts, prompt: "Ask about scout contracts", goto: contract_list }
            - { id: check_prestige, prompt: "Ask about your scouts prestige", goto: prestige_info }
            - { id: request_badge, prompt: "Request a Scout Badge (Requires 50 Royal Scouts Prestige)", goto: give_badge, conditions: [ { guild_prestige_gte: { guild: "royal_scouts", value: 50 } }, { none_of: [ { has_item: "scout_badge" } ] } ] }
            - { id: turn_in_smuggle, prompt: "Report delivery of the broadsword to the Castle Wall", goto: smuggle_success, conditions: [ { guild_contract_active: "c_smuggle_broadsword" }, { has_item: "broadsword" }, { visited: "castle_wall" } ] }
            - { id: turn_in_enforce, prompt: "Report defeat of the Goblin Guard", goto: enforce_success, conditions: [ { guild_contract_active: "c_enforce_goblin" }, { has_flag: "npc_dead_goblin_guard" } ] }
            - { id: turn_in_seal, prompt: "Report delivery of the Royal Seal to the Castle Wall", goto: seal_success, conditions: [ { guild_contract_active: "c_smuggle_royal_seal" }, { has_item: "royal_seal" }, { visited: "castle_wall" } ] }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: greet
          npc_text: "Greetings, traveler. I am a scout for the King. We need agents to perform contracts. Do you wish to help?"
          topics:
            - { id: ask_contracts, prompt: "Ask about scout contracts", goto: contract_list }
            - { id: check_prestige, prompt: "Ask about your scouts prestige", goto: prestige_info }
            - { id: request_badge, prompt: "Request a Scout Badge (Requires 50 Royal Scouts Prestige)", goto: give_badge, conditions: [ { guild_prestige_gte: { guild: "royal_scouts", value: 50 } }, { none_of: [ { has_item: "scout_badge" } ] } ] }
            - { id: turn_in_smuggle, prompt: "Report delivery of the broadsword to the Castle Wall", goto: smuggle_success, conditions: [ { guild_contract_active: "c_smuggle_broadsword" }, { has_item: "broadsword" }, { visited: "castle_wall" } ] }
            - { id: turn_in_enforce, prompt: "Report defeat of the Goblin Guard", goto: enforce_success, conditions: [ { guild_contract_active: "c_enforce_goblin" }, { has_flag: "npc_dead_goblin_guard" } ] }
            - { id: turn_in_seal, prompt: "Report delivery of the Royal Seal to the Castle Wall", goto: seal_success, conditions: [ { guild_contract_active: "c_smuggle_royal_seal" }, { has_item: "royal_seal" }, { visited: "castle_wall" } ] }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: contract_list
          npc_text: "I have two tasks. First, a smuggling task: retrieve the steel broadsword from the Armory and bring it to the Castle Wall. Second, an enforcement task: defeat the Goblin Guard in the Courtyard. If you have high standing, I might have a more sensitive task."
          topics:
            - { id: take_smuggle, prompt: "Accept the broadsword smuggling contract", goto: accept_smuggle, conditions: [ { none_of: [ { guild_contract_active: "c_smuggle_broadsword" }, { guild_contract_completed: "c_smuggle_broadsword" } ] } ] }
            - { id: take_enforce, prompt: "Accept the goblin enforcement contract", goto: accept_enforce, conditions: [ { none_of: [ { guild_contract_active: "c_enforce_goblin" }, { guild_contract_completed: "c_enforce_goblin" } ] } ] }
            - { id: take_seal, prompt: "Accept the premium Royal Seal smuggling contract (Requires 80 Royal Scouts Prestige)", goto: accept_seal, conditions: [ { guild_prestige_gte: { guild: "royal_scouts", value: 80 } }, { none_of: [ { guild_contract_active: "c_smuggle_royal_seal" }, { guild_contract_completed: "c_smuggle_royal_seal" } ] } ] }
            - { id: back, prompt: "Go back", goto: greet }
        - id: accept_smuggle
          npc_text: "Excellent. Smuggle the steel broadsword to the Castle Wall, then report back."
          effects:
            - accept_guild_contract:
                id: c_smuggle_broadsword
                guild: royal_scouts
                type: smuggling
                target: broadsword
                target_room: castle_wall
                reward_gold: 100
                reward_prestige: 50
          topics:
            - { id: back, prompt: "Go back", goto: greet }
        - id: accept_enforce
          npc_text: "Defeat the Goblin Guard blocking the courtyard, then report back."
          effects:
            - accept_guild_contract:
                id: c_enforce_goblin
                guild: royal_scouts
                type: enforcement
                target: goblin_guard
                reward_gold: 80
                reward_prestige: 40
          topics:
            - { id: back, prompt: "Go back", goto: greet }
        - id: accept_seal
          npc_text: "A highly sensitive assignment. Smuggle the Royal Seal from the Library to the Castle Wall. Be careful."
          effects:
            - accept_guild_contract:
                id: c_smuggle_royal_seal
                guild: royal_scouts
                type: smuggling
                target: royal_seal
                target_room: castle_wall
                reward_gold: 200
                reward_prestige: 80
          topics:
            - { id: back, prompt: "Go back", goto: greet }
        - id: smuggle_success
          npc_text: "Splendid! The broadsword has been secured on the Castle Wall. Here is your reward."
          effects:
            - complete_guild_contract:
                id: c_smuggle_broadsword
          topics:
            - { id: back, prompt: "Go back", goto: greet }
        - id: enforce_success
          npc_text: "Outstanding work! The Goblin Guard has been handled. The Royal Scouts salute you."
          effects:
            - complete_guild_contract:
                id: c_enforce_goblin
          topics:
            - { id: back, prompt: "Go back", goto: greet }
        - id: seal_success
          npc_text: "Magnificent! The Royal Seal has been secured on the Castle Wall. You are now a legendary agent of the Royal Scouts."
          effects:
            - complete_guild_contract:
                id: c_smuggle_royal_seal
          topics:
            - { id: back, prompt: "Go back", goto: greet }
        - id: prestige_info
          npc_text: "Your prestige reflects your status with the Scouts. Earn more by completing contracts."
          topics:
            - { id: back, prompt: "Go back", goto: greet }
        - id: give_badge
          npc_text: "You have earned the trust of the Royal Scouts. Wear this bronze badge with pride."
          effects:
            - add_item: scout_badge
          topics:
            - { id: back, prompt: "Go back", goto: greet }

win_conditions:
  - id: save_kingdom
    conditions: [ { has_flag: kingdom_restored } ]
    ending: ending_victory

endings:
  - id: ending_victory
    title: "Saviour of the Realm"
    text: "You have returned the Royal Crown to King Aldous, defeated the Shadow Knight, and lifted the shadows from the castle. You are hailed as a legendary hero!"
  - id: ending_died_in_combat
    title: "Fallen Hero"
    text: "Your HP reached 0 in the heat of battle. The castle shadows have claimed another soul."
