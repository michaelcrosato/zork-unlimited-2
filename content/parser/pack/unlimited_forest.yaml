meta:
  id: unlimited_forest_pack
  title: "The Procedural Forest"
  start_room: clearing
  vars_init:
    score: 0
    gold: 80
  flags_init: [ shovel_undug ]

rooms:
  - id: clearing
    name: "Sunlit Clearing"
    description: "A beautiful sunlit clearing in the heart of the forest. The trees press in close, but a path leads west. Steep rocks lead up to a cliffside."
    objects: [ shovel, mound ]
    npcs: [ guild_master, elven_ranger ]
    weather_pool: [ clear, rain, fog ]
    exits:
      - { direction: west, to: deep_forest }
      - direction: up
        to: cliffside
        locked_msg: "The rocks are too slick to climb in the rain. You need sturdy boots for traction."
        conditions:
          - any_of:
              - none_of:
                  - { weather_is: "rain" }
                  - { weather_is: "storm" }
              - all_of:
                  - { weather_is: "rain" }
                  - { has_item: "leather_boots" }
              - all_of:
                  - { weather_is: "storm" }
                  - { has_item: "leather_boots" }
                  - { has_item: "climbing_harness" }

  - id: deep_forest
    name: "Deep Forest"
    description: "The canopy blocks out most of the sun. It feels gloomy and silent. A goblin merchant sits on a mossy log here."
    objects: []
    npcs: [ goblin_merchant, goblin_thief ]
    weather_pool: [ fog, rain ]
    exits:
      - { direction: east, to: clearing }

  - id: cliffside
    name: "Slick Cliffside"
    description: "A high cliffside overlooking the forest below. The rocks here are slick and steep."
    objects: []
    npcs: []
    weather_pool: [ clear, rain, storm ]
    exits:
      - { direction: down, to: clearing }

objects:
  - id: shovel
    name: "rusty shovel"
    aliases: [ shovel, rusty shovel, spade ]
    description: "A rusty iron shovel with a sturdy wooden handle."
    takeable: true

  - id: mound
    name: "earthen mound"
    aliases: [ mound, earth, dirt ]
    description: "A small mound of soft, freshly turned earth."
    takeable: false
    interactions:
      - verb: USE
        item: shovel
        target: mound
        conditions: [ { has_flag: shovel_undug } ]
        effects:
          - clear_flag: shovel_undug
          - generate_procedural_room:
              direction: east
              to_id: hidden_glade
              name: "Hidden Glade"
              description: "A beautiful hidden glade has been revealed here. Wildflowers of all colors grow in abundance."
          - narrate: "You dig vigorously into the earthen mound with the shovel. After a few scoops, you uncover a hidden passage leading east!"

  - id: gold_ring
    name: "gold ring"
    aliases: [ ring, gold ring, golden ring ]
    description: "A shiny golden ring that glimmers under any light."
    takeable: true
    cost: 30

  - id: leather_boots
    name: "leather boots"
    aliases: [ boots, leather boots ]
    description: "Sturdy leather boots that provide excellent traction on slick surfaces."
    takeable: true
    cost: 20
    climate_pricing:
      rain: 1.5
      storm: 2.0

  - id: silver_pendant
    name: "silver pendant"
    aliases: [ pendant, silver pendant, necklace ]
    description: "An elegant silver pendant shaped like a crescent moon."
    takeable: true
    cost: 40

  - id: lantern
    name: "brass lantern"
    aliases: [ lantern, brass lantern, light ]
    description: "A small brass lantern that burns bright oil."
    takeable: true
    cost: 15

  - id: climbing_harness
    name: "climbing harness"
    aliases: [harness, climbing harness, gear]
    description: "A durable climbing harness made of braided hemp and leather straps."
    takeable: true
    cost: 30


npcs:
  - id: goblin_merchant
    name: "goblin merchant"
    description: "A green-skinned goblin merchant wearing a purple vest and a monocle."
    climate_pricing:
      fog: 1.5
      rain: 0.8
    dialogue:
      root: greet
      nodes:
        - id: greet
          npc_text: "Greetings, tall one! I have rare goods. I can sell you a shiny golden ring for 30 gold, or sturdy leather boots for 20 gold. Or, if you have a golden ring, I can buy it back for 15 gold."
          topics:
            - { id: buy_ring, prompt: "Buy gold ring (30 gold)", goto: bought_ring }
            - { id: buy_boots, prompt: "Buy leather boots (20 gold)", goto: bought_boots }
            - { id: buy_pendant, prompt: "Buy silver pendant (40 gold)", goto: bought_pendant }
            - { id: buy_lantern, prompt: "Buy brass lantern (15 gold)", goto: bought_lantern }
            - { id: buy_shovel, prompt: "Buy rusty shovel (15 gold)", goto: bought_shovel }
            - { id: sell_ring, prompt: "Sell gold ring (15 gold)", goto: sold_ring }
            - { id: sell_pendant, prompt: "Sell silver pendant (20 gold)", goto: sold_pendant }
            - { id: sell_shovel, prompt: "Sell rusty shovel (10 gold)", goto: sold_shovel }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: bought_ring
          npc_text: "A fine choice! The ring is yours."
          effects:
            - trade_item:
                give_gold: 30
                receive_item: gold_ring
                fail_msg: "\"You do not have enough gold!\" he cackles."
                success_msg: "You trade 30 gold for a beautiful gold ring."
          topics:
            - { id: greet_again, prompt: "Let's talk more", goto: greet }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: bought_boots
          npc_text: "A fine choice! Sturdy leather boots for a sturdy traveler."
          effects:
            - trade_item:
                give_gold: 20
                receive_item: leather_boots
                fail_msg: "\"You do not have enough gold!\" he cackles."
                success_msg: "You trade 20 gold for sturdy leather boots."
          topics:
            - { id: greet_again, prompt: "Let's talk more", goto: greet }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: bought_pendant
          npc_text: "A beautiful choice! It matches your eyes."
          effects:
            - trade_item:
                give_gold: 40
                receive_item: silver_pendant
                fail_msg: "\"You lack the gold!\" he grunts."
                success_msg: "You trade 40 gold for a silver pendant."
          topics:
            - { id: greet_again, prompt: "Let's talk more", goto: greet }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: bought_lantern
          npc_text: "A bright choice! Very useful in the deep caves."
          effects:
            - trade_item:
                give_gold: 15
                receive_item: lantern
                fail_msg: "\"You lack the gold!\" he cackles."
                success_msg: "You trade 15 gold for a brass lantern."
          topics:
            - { id: greet_again, prompt: "Let's talk more", goto: greet }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: bought_shovel
          npc_text: "Here is your shovel back."
          effects:
            - trade_item:
                give_gold: 15
                receive_item: shovel
                fail_msg: "\"Not enough gold!\" he cackles."
                success_msg: "You trade 15 gold for the rusty shovel."
          topics:
            - { id: greet_again, prompt: "Let's talk more", goto: greet }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: sold_ring
          npc_text: "Excellent business! Here is your gold."
          effects:
            - trade_item:
                give_item: gold_ring
                receive_gold: 15
                fail_msg: "\"You do not possess the ring!\" he snarls."
                success_msg: "You trade your gold ring for 15 gold."
          topics:
            - { id: greet_again, prompt: "Let's talk more", goto: greet }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: sold_pendant
          npc_text: "Ah, exquisite silver! I will pay you 20 gold for it."
          effects:
            - trade_item:
                give_item: silver_pendant
                receive_gold: 20
                fail_msg: "\"You do not have the pendant!\" he scowls."
                success_msg: "You trade your silver pendant for 20 gold."
          topics:
            - { id: greet_again, prompt: "Let's talk more", goto: greet }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: sold_shovel
          npc_text: "A bit rusty, but it still works. Here is 10 gold."
          effects:
            - trade_item:
                give_item: shovel
                receive_gold: 10
                fail_msg: "\"You don't have a shovel to sell!\" he points out."
                success_msg: "You trade your rusty shovel for 10 gold."
          topics:
            - { id: greet_again, prompt: "Let's talk more", goto: greet }
            - { id: leave, prompt: "Say goodbye", end: true }

  - id: guild_master
    name: "guild master"
    description: "A hooded figure wearing the emblem of the Smugglers Guild."
    dialogue:
      root: greet
      greeting_overrides:
        - node: greet_fog
          conditions: [ { weather_is: "fog" } ]
        - node: greet_rain
          conditions: [ { weather_is: "rain" } ]
      nodes:
        - id: greet_fog
          npc_text: "The fog is thick today. Watch your step, and carry a lantern if you travel out of this clearing!"
          topics:
            - { id: ask_contracts, prompt: "Ask about available contracts", goto: contract_list }
            - { id: check_prestige, prompt: "Check your prestige", goto: prestige_info }
            - { id: turn_in_smuggle, prompt: "Report completion of the smuggling contract", goto: turn_in_success, conditions: [ { guild_contract_active: "c_smuggle_ring" }, { has_item: "gold_ring" }, { visited: "cliffside" } ] }
            - { id: turn_in_enforce, prompt: "Report completion of the enforcement contract", goto: enforce_success, conditions: [ { guild_contract_active: "c_enforce_thief" }, { has_flag: "npc_defeated_goblin_thief" } ] }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: greet_rain
          npc_text: "This rain is miserable. The rocks leading up to the cliffside are too slick to climb without leather boots."
          topics:
            - { id: ask_contracts, prompt: "Ask about available contracts", goto: contract_list }
            - { id: check_prestige, prompt: "Check your prestige", goto: prestige_info }
            - { id: turn_in_smuggle, prompt: "Report completion of the smuggling contract", goto: turn_in_success, conditions: [ { guild_contract_active: "c_smuggle_ring" }, { has_item: "gold_ring" }, { visited: "cliffside" } ] }
            - { id: turn_in_enforce, prompt: "Report completion of the enforcement contract", goto: enforce_success, conditions: [ { guild_contract_active: "c_enforce_thief" }, { has_flag: "npc_defeated_goblin_thief" } ] }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: greet
          npc_text: "Welcome to the Smugglers outpost. If you want to increase your prestige and earn gold, I have contracts for you. Or, if you have finished a contract, report to me."
          topics:
            - { id: ask_contracts, prompt: "Ask about available contracts", goto: contract_list }
            - { id: check_prestige, prompt: "Check your prestige", goto: prestige_info }
            - { id: turn_in_smuggle, prompt: "Report completion of the smuggling contract", goto: turn_in_success, conditions: [ { guild_contract_active: "c_smuggle_ring" }, { has_item: "gold_ring" }, { visited: "cliffside" } ] }
            - { id: turn_in_enforce, prompt: "Report completion of the enforcement contract", goto: enforce_success, conditions: [ { guild_contract_active: "c_enforce_thief" }, { has_flag: "npc_defeated_goblin_thief" } ] }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: contract_list
          npc_text: "I have two tasks. First, a smuggling run: take a gold ring to the Slick Cliffside. Second, an enforcement run: defeat the goblin thief who has been stealing our supplies."
          topics:
            - { id: take_smuggle, prompt: "Accept the smuggling contract", goto: accept_smuggle, conditions: [ { none_of: [ { guild_contract_active: "c_smuggle_ring" }, { guild_contract_completed: "c_smuggle_ring" } ] } ] }
            - { id: take_enforce, prompt: "Accept the enforcement contract", goto: accept_enforce, conditions: [ { none_of: [ { guild_contract_active: "c_enforce_thief" }, { guild_contract_completed: "c_enforce_thief" } ] } ] }
            - { id: back, prompt: "Go back", goto: greet }
        - id: accept_smuggle
          npc_text: "Excellent. Smuggle a gold ring to the Slick Cliffside. Return to me when you've reached the cliffside with the ring."
          effects:
            - accept_guild_contract:
                id: c_smuggle_ring
                guild: smugglers
                type: smuggling
                target: gold_ring
                target_room: cliffside
                reward_gold: 100
                reward_prestige: 50
          topics:
            - { id: back, prompt: "Go back", goto: greet }
        - id: accept_enforce
          npc_text: "Defeat the goblin thief in the deep forest, then report back."
          effects:
            - accept_guild_contract:
                id: c_enforce_thief
                guild: enforcers
                type: enforcement
                target: goblin_thief
                reward_gold: 150
                reward_prestige: 75
          topics:
            - { id: back, prompt: "Go back", goto: greet }
        - id: turn_in_success
          npc_text: "Splendid! The shipment has been delivered. Here is your reward."
          effects:
            - complete_guild_contract:
                id: c_smuggle_ring
          topics:
            - { id: back, prompt: "Go back", goto: greet }
        - id: enforce_success
          npc_text: "Outstanding work! The enforcers thank you. Here is your reward."
          effects:
            - complete_guild_contract:
                id: c_enforce_thief
          topics:
            - { id: back, prompt: "Go back", goto: greet }
        - id: prestige_info
          npc_text: "You can see your prestige in your status report. Work hard to raise your rank!"
          topics:
            - { id: back, prompt: "Go back", goto: greet }

  - id: goblin_thief
    name: "goblin thief"
    description: "A sneaky goblin thief holding a bag of stolen guild supplies."
    hp: 10
    max_hp: 10
    attack: 2
    defense: 8
    gold: 5
    xp: 15
    dialogue:
      root: greet
      nodes:
        - id: greet
          npc_text: "What are you looking at? Get lost or fight me!"
          topics:
            - { id: attack_thief, prompt: "Attack him!", goto: fight_node }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: fight_node
          npc_text: "You want to fight? Let's go!"
          effects:
            - start_combat: { npc_id: goblin_thief }
          topics: []

  - id: elven_ranger
    name: "elven ranger"
    description: "An elven ranger leaning against a tree, watching the horizon."
    dialogue:
      root: greet
      nodes:
        - id: greet
          npc_text: "Greetings, traveler. The storms around here can be vicious. If you plan to scale the peaks, you will need a climbing harness. I can sell you one for 30 gold."
          topics:
            - { id: buy_harness, prompt: "Buy climbing harness (30 gold)", goto: bought_harness }
            - { id: leave, prompt: "Say goodbye", end: true }
        - id: bought_harness
          npc_text: "Be careful out there. The harness will keep you secure even in a raging storm."
          effects:
            - trade_item:
                give_gold: 30
                receive_item: climbing_harness
                fail_msg: "\"You do not have enough gold!\" she notes."
                success_msg: "You trade 30 gold for a climbing harness."
          topics:
            - { id: greet_again, prompt: "Let's talk more", goto: greet }
            - { id: leave, prompt: "Say goodbye", end: true }

win_conditions:
  - id: reach_glade
    conditions: [ { visited: hidden_glade } ]
    ending: ending_victory

endings:
  - id: ending_victory
    title: "Hidden Glade Discovered!"
    text: "You successfully uncovered the hidden passage and entered the beautiful glade. Your adventure is complete."
